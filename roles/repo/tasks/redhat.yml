- name: "Changing listening address in 'postgresql.conf'"
  lineinfile:
    path: "{{ postgresql_conf_path }}"
    insertafter: '^#listen_addresses '
    line: listen_addresses = '*'

- name: "Allowing connection from all in 'pg_hba.conf'"
  lineinfile:
    path: "{{ pg_hba_path }}"
    insertafter: '^host    all             all             127.0.0.1/32            md5'
    line: 'host    all             all             0.0.0.0/0               md5'

- name: "Restarting PostgreSQL DB"
  systemd:
    state: restarted
    enabled: yes
    daemon_reload: yes
    name: "{{ pg_srv_name }}"

- name: "Allowing services by 'firewalld'"
  firewalld:
    service: "{{ item }}"
    permanent: yes
    state: enabled
    immediate: yes
  loop:
  - http
  - postgresql

- name: "Installing supplementary packagies"
  package:
    name: "{{ item }}"
    state: present
  loop: "{{ pkg_list['supplementary'] }}"

- name: "Starting 'keydb' service"
  systemd:
    name: keydb.service
    state: started
    enabled: yes
    daemon_reload: yes
  when: "'keydb' in pkg_list['supplementary']"
