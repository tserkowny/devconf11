# ./roles/repo/tasks/redhat.yml
---

- name: "Adding Luxms BI repositories"
  import_tasks: set-luxms-yum-repo.yml

- name: "Adding supplementary YUM repositories"
  yum:
    name:
    - epel-release
    - centos-release-scl-rh
    - policycoreutils-python
    state: present
    validate_certs: no
  register: result
  retries: 5
  delay: 180
  until: result is not failed

- name: "Installing 'PostgreSQL'"
  import_tasks: install-yum-postgresql.yml

- name: "Registering Contents of 'PGDATA' Folder"
  shell: "ls {{ pd_data }}"
  register: pg_contents

# change 23-0607
- name: "Database 'PostgreSQL' initialization"
#  shell: "/usr/pgsql-{{ pg_ver }}/bin/initdb"
  shell: "/usr/pgsql-{{ pg_ver }}/bin/initdb"
  environment:
    PGDATA: "{{ pd_data }}"
  become: yes
  become_user: postgres
  when: pg_contents["stdout_lines"] | length == 0

