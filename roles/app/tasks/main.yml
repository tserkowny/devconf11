#    copy:
#      src: nginx.apt-preference
#      dest: /etc/apt/preferences.d/nginx
#      owner: root
#      group: root
#      mode: '0644'

  when: ansible_os_family == "Astra Linux"


- name: Install Chromium in MosOS
  shell: zypper in --force-resolution -y chromium
  when: ansible_os_family is match("MosOS*")


- name: "Install Luxms BI packagies"
  package:
    name: "{{ item }}"
    state: present
  loop:
    - luxmsbi-web
#    - luxmsbi-web=11.1.28-20250909~alse1.7
    - luxmsbi-appserver-mono
    - luxmsbi-gateway
    - luxmsbi-pumpushka
    - luxmsbi-docs
    - luxms-databoring

- name: Collect information about the services on the server
  service_facts:

- name: "Stop systemd units"
  systemd:
    name: "{{ item }}"
    enabled: no
    state: stopped
  when: ansible_facts.services["{{ item }}.service"] is defined
  loop:
    - luxmsbi-web
    - luxmsbi-headless-chrome
    - luxmsbi-gateway
    - luxmsbi-appserver
    - luxmsbi-pumpushka
    - luxms-databoring
    - nats-server
    - keydb-server
    - keydb
    - nginx

- name: "Use the configuration file to configure the 'luxmsbi-pumpushka'"
  copy:
    src: luxmsbi-pumpushka.conf
    dest: /opt/luxmsbi/conf/
    mode: 0640
    owner: bi

- name: Install PostgreSQL on RedOS
  block:

  - name: "Install PostgreSQL and psycopg"
    yum:
      name:
        - "postgresql{{ PG_VER }}"
        - "postgresql{{ PG_VER }}-server"
        - "postgresql{{ PG_VER }}-contrib"
        - 'python3-psycopg2'
      state: present

  - name: "Download Luxms BI Database and DS Infosec"
    dnf:
      name:
        - "luxmsbi-pg{{ PG_VER }}"
        - "luxmsbi-pg-ds-infosec"
      download_only: true
      download_dir: /opt/lux-upd/install/tmp
      state: present

  when: ansible_os_family == "RED" or ansible_os_family == "REDOS"


- name: "Install PostgreSQL on Astra Linux 1.7"
  block:

  - name: Import postgresql repo key
    apt_key:
      url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
      state: present

  - name: Import keyserver.ubuntu.com repo keys
    apt_key:
      keyserver: keyserver.ubuntu.com
      id: 648ACFD622F3D138
      state: present

  - name: "Add postgresql-archive DEB repository for Astra Linux 1.7"
    apt_repository:
      repo: deb https://apt-archive.postgresql.org/pub/repos/apt buster-pgdg main
      filename: pgdg

  - name: "Add postgresql DEB repository for Astra Linux 1.7"
    apt_repository:
      repo: "deb https://apt.postgresql.org/pub/repos/apt bullseye-pgdg {{ PG_VER }}"
      filename: pgdg

  - name: "Install postgresql-13 and psycopg"
    apt:
      name: "{{ item }}"
      update_cache: yes
    loop:
      - "libpq5={{ PG_VER }}*"
      - "postgresql-client-{{ PG_VER }}"
      - "postgresql-{{ PG_VER }}"
      - 'python3-psycopg2'

  - name: "Download Luxms BI Database and DS Infosec"
#    shell: apt clean all && apt install -y --download-only --reinstall luxmsbi-pg{{ PG_VER }} luxmsbi-pg-ds-infosec && mv /var/cache/apt/archives/*.deb /opt/lux-upd/install/tmp/
    shell: apt clean all && apt install -y --download-only --reinstall luxmsbi-pg13=11.1.7-20250901~alse1.7 luxmsbi-pg-ds-infosec && mv /var/cache/apt/archives/*.deb /opt/lux-upd/install/tmp/
  when: ansible_os_family == "Astra Linux" and ansible_distribution_major_version == "1.7*"
 
