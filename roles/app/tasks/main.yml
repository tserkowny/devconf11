- name: "Install PostgreSQL15 on Rocky Linux 8"
  block:

    - name: "Setting the locale"
      package:
        name: glibc-langpack-ru
        state: present

    - name: "Install PostgreSQL15 on Rocky Linux 8"
      package:
        name: '{{ item }}'
        state: present
      loop:
        - '@postgresql:{{ PG_VER }}/client'
        - '@postgresql:{{ PG_VER }}/server'
        - 'postgresql-contrib'
        - 'python3-psycopg2'

    - name: "Download Luxms BI Database and DS Infosec"
      dnf:
        name:
          - 'luxmsbi-pg{{ PG_VER }}'
          - 'luxmsbi-pg-ds-infosec'
        download_only: true
        download_dir: /opt/lux-upd/install/tmp/

  when: ansible_os_family == "RedHat" and ansible_distribution_major_version == "8" and PG_VER == "15"

