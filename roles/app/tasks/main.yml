# roles/app/tasks/main.yml
---

- name: Creating a directory for temporary storage of installation files Luxms BI
  file:
    path: /opt/lux-upd/install/tmp
    state: directory

- name: Install and Start Supplementary Packagies on RPM / ALT
  block:

  - name: "Install supplementary packagies on RPM / ALT"
    package:
      name:
        - nats-server
        - keydb
      state: present

  when: ansible_os_family is not match("Astra Linux*")

- name: Install and Start Supplementary Packagies and setting nginx preferences on Astra Linux
  block:

  - name: "Install supplementary packagies on Astra Linux"
    package:
      name:
        - nats-server
        - keydb-server
      state: present

#  - name: Запрещает автозапуск для nginx
