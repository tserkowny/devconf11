- name: Install PostgreSQL on ALT Linux
  block:

  - name: "Install postgresql and psycopg"
    package:
      name:
        - "postgresql{{ PG_VER }}-server"
        - 'python3-module-psycopg2'

  - name: "Download Luxms BI Database and DS Infosec"
    shell: "apt-get clean all && apt-get install -y --download-only --reinstall luxmsbi-pg{{ PG_VER }} luxmsbi-pg-ds-infosec && mv /var/cache/apt/archives/*.rpm /opt/lux-upd/install/tmp/"

  - name: Changing the shell for the postgres user
    user:
      name: postgres
      shell: /bin/bash

  when: ansible_os_family == "Altlinux"


- name: Install PostgreSQL on MosOS
  block:

  - name: "Install PostgreSQL"
    zypper:
      name:
        - 'postgresql{{ PG_VER }}'
        - 'postgresql{{ PG_VER }}-server'
        - 'postgresql{{ PG_VER }}-contrib'
        - 'python3-psycopg2'
      state: present

  - name: "Download Luxms BI Database and DS Infosec"
    shell: "rm -rf /var/cache/zypp/packages/* && zypper in -y -d luxmsbi-pg{{ PG_VER }} luxmsbi-pg-ds-infosec && find /var/cache/zypp/packages -type f | xargs -I '{}' mv {} /opt/lux-upd/install/tmp/"

  when: ansible_os_family is match("MosOS*")


- name: Getting the postgres account settings
  user:
    name: postgres
    state: present
  register: user_postgres_info
  check_mode: true

- set_fact:
    PG_HOME: "{{ user_postgres_info.home }}"

- name: Setting up a postgres user profile (PGDATA)
  lineinfile:
    path: "{{ PG_HOME }}/.bash_profile"
    line: "export PGDATA=/data/pgdata"
    regexp: '^PGDATA=.*'
    create: yes
    owner: postgres
    group: postgres
    mode: 0600

- name: Setting up a postgres user profile (PATH)
  lineinfile:
    path: "{{ PG_HOME }}/.bash_profile"
    line: "export PATH={{ PG_BIN_DIR[ansible_os_family][ansible_distribution_major_version] }}:$PATH"
#    line: "export PATH={{ PG_BIN_DIR[ansible_os_family] }}:$PATH"

- name: Saving the file with the version of the installed PostgreSQL
  lineinfile:
    path: /opt/lux-upd/install/.installed
    line: "{{ PG_VER }}"
    create: yes